<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="https://ramshrestha23.com.np/images/portfolio-og.png"
      type="image/png"
      sizes="512x512"
    />
    <link
      rel="apple-touch-icon"
      href="https://ramshrestha23.com.np/images/portfolio-og.png"
    />
    <link rel="canonical" href="https://ramshrestha23.com.np/" />
    <!-- Updated description for Data Scientist -->
    <meta
      name="description"
      content="Portfolio of Ram Shrestha — a Data Scientist based in Kathmandu, Nepal. Explore data analysis, machine learning projects, and portfolio showcase."
    />

    <!-- Open Graph / Social Media -->
    <meta
      property="og:title"
      content="Ram Shrestha | Data Scientist Portfolio"
    />
    <meta
      property="og:description"
      content="Explore Ram Shrestha's data science projects, ML models, data analysis, and Kaggle notebooks."
    />
    <meta property="og:url" content="https://ramshrestha23.com.np/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/portfolio-og.png" />
    <!-- Optional: preview image -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ram Shrestha | Data Scientist Portfolio"
    />
    <meta
      name="twitter:description"
      content="Explore Ram Shrestha's data science projects, machine learning models, and analysis."
    />
    <meta name="twitter:image" content="/images/portfolio-og.png" />

    <title>
      Ram Shrestha | Data Scientist & AI Engineer Portfolio | Kathmandu, Nepal
    </title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ram Shrestha",
        "url": "https://ramshrestha23.com.np/",
        "description": "Portfolio website of Ram Shrestha, a Data Scientist and Machine Learning Researcher from Nepal.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ramshrestha23.com.np/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </body>
</html>
