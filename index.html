<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 SEO Title (Optimized Keywords) -->
    <title>
      Ram Shrestha | Data Scientist in Nepal | AI Engineer Kathmandu
    </title>

    <!-- 🔥 SEO Meta Description -->
    <meta
      name="description"
      content="Ram Shrestha is a Data Scientist in Nepal based in Kathmandu. Skilled in Python, Machine Learning, AI, and Data Analytics with real-world projects."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://ramshrestha23.com.np/" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="/images/Favicon.png"
      type="image/png"
      sizes="48x48"
    />

    <!-- 🔥 Open Graph (Facebook, LinkedIn SEO) -->
    <meta
      property="og:title"
      content="Ram Shrestha | Data Scientist in Nepal"
    />
    <meta
      property="og:description"
      content="Data Scientist in Nepal | AI Engineer Kathmandu specializing in Machine Learning, Python, and Data Analytics."
    />
    <meta
      property="og:image"
      content="https://ramshrestha23.com.np/images/profile.jpg"
    />
    <meta property="og:url" content="https://ramshrestha23.com.np/" />
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 🔥 Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ram Shrestha | Data Scientist in Nepal"
    />
    <meta
      name="twitter:description"
      content="Portfolio of Ram Shrestha, a Data Scientist in Kathmandu, Nepal specializing in AI, ML, and Python."

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"

    <link
      rel="preload"

      as="style"

        this.rel = 'stylesheet';
      "
    />
